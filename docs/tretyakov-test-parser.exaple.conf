<VirtualHost *:80>
    ServerName tretyakov-test-parser.local

    DocumentRoot "PATH_TO_PROJECT/public"

    <Directory "PATH_TO_PROJECT/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/tretyakov-test-parser-error.log
    CustomLog ${APACHE_LOG_DIR}/tretyakov-test-parser-access.log combined
</VirtualHost>